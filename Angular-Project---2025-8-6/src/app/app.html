<div class="app-shell" [class.admin-layout]="isAdminRoute()">
  <!-- Main Premium Navigation -->
  <nav class="main-nav glass-panel" [class.scrolled]="false">
    <a routerLink="/" class="nav-brand">
      <h1 class="brand-font">ABD <span>Clothing</span></h1>
    </a>

    <div class="nav-links" *ngIf="!isAdminRoute()">
      <a routerLink="/" class="nav-link" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
      <a [routerLink]="['/']" [queryParams]="{sort: 'newest'}" class="nav-link">New Arrivals</a>
      <a [routerLink]="['/']" [queryParams]="{category: 'Dresses'}" class="nav-link">Collections</a>
    </div>

    <div class="nav-actions">
      <!-- Search Bar -->
      <div class="search-container" [class.open]="searchOpen">
        <button class="icon-btn search-trigger" (click)="openSearch()">
          <i class="fas fa-search"></i>
        </button>
        <div class="search-overlay" *ngIf="searchOpen" (click)="closeSearch()"></div>
        <div class="search-dropdown glass-panel" *ngIf="searchOpen">
          <input 
            type="text" 
            [formControl]="searchControl" 
            placeholder="Search products..."
            class="search-input"
            #searchInput
            (keyup.escape)="closeSearch()"
          >
          <div class="search-results" *ngIf="searchResults$ | async as results">
            <div *ngFor="let p of results" (click)="goToProduct(p._id)" class="search-item">
              <img [src]="p.images?.[0] || 'assets/placeholder.png'" alt="">
              <div class="item-info">
                <span class="item-name">{{p.name}}</span>
                <span class="item-price">${{p.price}}</span>
              </div>
            </div>
            <div *ngIf="results.length === 0 && searchControl.value.length >= 2" class="no-results">
              No products found
            </div>
          </div>
        </div>
      </div>

      <!-- User Actions -->
      <div class="user-menu">
        <ng-container *ngIf="isLoggedIn(); else loginBtn">
          <a [routerLink]="getDashboardRoute()" class="icon-btn" title="Dashboard">
            <i class="fas fa-user-circle"></i>
          </a>
          <a routerLink="/cart" class="icon-btn cart-btn" title="Shopping Cart">
            <i class="fas fa-shopping-bag"></i>
          </a>
          <button (click)="logout()" class="icon-btn" title="Logout">
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </ng-container>
        <ng-template #loginBtn>
          <a routerLink="/login" class="btn-minimal">Sign In</a>
        </ng-template>
      </div>

      <!-- Theme Toggle -->
      <button class="theme-toggle" (click)="toggleTheme()" [title]="'Switch to ' + (theme === 'dark' ? 'light' : 'dark') + ' mode'">
        <i class="fas" [class.fa-moon]="theme === 'light'" [class.fa-sun]="theme === 'dark'"></i>
      </button>
    </div>
  </nav>

  <!-- Sidebar for Admin Views -->
  <aside 
    class="admin-sidebar glass-panel" 
    *ngIf="isAdminRoute()"
    [class.collapsed]="sidebarCollapsed"
    (mouseenter)="onSidebarMouseEnter()"
    (mouseleave)="onSidebarMouseLeave()"
  >
    <div class="sidebar-header">
      <div class="logo-circle">A</div>
      <span class="admin-title">Admin <span>Hub</span></span>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="side-link">
        <i class="fas fa-chart-line"></i>
        <span>Dashboard</span>
      </a>
      <a routerLink="/admin/products" routerLinkActive="active" class="side-link">
        <i class="fas fa-tshirt"></i>
        <span>Products</span>
      </a>
      <a routerLink="/admin/inventory" routerLinkActive="active" class="side-link">
        <i class="fas fa-warehouse"></i>
        <span>Inventory</span>
      </a>
      <a routerLink="/admin/orders" routerLinkActive="active" class="side-link">
        <i class="fas fa-shopping-cart"></i>
        <span>Orders</span>
      </a>
      <a routerLink="/admin/financials" routerLinkActive="active" class="side-link">
        <i class="fas fa-file-invoice-dollar"></i>
        <span>Financials</span>
      </a>
      <a routerLink="/admin/reports" routerLinkActive="active" class="side-link">
        <i class="fas fa-file-alt"></i>
        <span>Reports</span>
      </a>
      <a routerLink="/admin/analytics" routerLinkActive="active" class="side-link">
        <i class="fas fa-rocket"></i>
        <span>Analytics</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main [class.reveal]="true">
    <router-outlet></router-outlet>
  </main>

  <app-toast></app-toast>
</div>
