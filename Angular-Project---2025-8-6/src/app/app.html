<div class="app-shell" [class.admin-layout]="isAdminRoute()">
  <!-- Main Premium Navigation -->
  <nav class="main-nav glass-panel" [class.scrolled]="false">
    <a routerLink="/" class="nav-brand">
      <h1 class="brand-font">Boutique<span>Flow</span></h1>
    </a>

    <div class="nav-links" *ngIf="!isAdminRoute()">
      <a routerLink="/" class="nav-link" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Shop</a>
      <a [routerLink]="['/']" [queryParams]="{sort: 'newest'}" class="nav-link">New Arrivals</a>
      <a [routerLink]="['/']" [queryParams]="{category: 'Collections'}" class="nav-link">Journal</a>
    </div>

    <div class="nav-actions">
      <!-- Search Bar -->
      <div class="search-container" [class.open]="searchOpen">
        <button class="icon-btn search-trigger" (click)="openSearch()">
          <i class="fas fa-search"></i>
        </button>
        <div class="search-overlay" *ngIf="searchOpen" (click)="closeSearch()"></div>
        <div class="search-dropdown glass-panel" *ngIf="searchOpen">
          <input 
            type="text" 
            [formControl]="searchControl" 
            placeholder="Search products..."
            class="search-input"
            #searchInput
            (keyup.escape)="closeSearch()"
          >
          <div class="search-results" *ngIf="searchResults$ | async as results">
            <div *ngFor="let p of results" (click)="goToProduct(p._id)" class="search-item">
              <img [src]="p.images?.[0] || 'assets/placeholder.png'" alt="">
              <div class="item-info">
                <span class="item-name">{{p.name}}</span>
                <span class="item-price">${{p.price}}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- User Actions -->
      <div class="user-menu">
        <ng-container *ngIf="isLoggedIn(); else loginBtn">
          <a [routerLink]="getDashboardRoute()" class="icon-btn" title="Account">
            <i class="fas fa-user"></i>
          </a>
          <a routerLink="/cart" class="icon-btn cart-btn" title="Cart">
            <i class="fas fa-shopping-bag"></i>
          </a>
        </ng-container>
        <ng-template #loginBtn>
          <a routerLink="/login" class="btn-minimal">Login</a>
        </ng-template>
      </div>

      <!-- Theme Toggle -->
      <button class="theme-toggle" (click)="toggleTheme()">
        <i class="fas" [class.fa-moon]="theme === 'light'" [class.fa-sun]="theme === 'dark'"></i>
      </button>
    </div>
  </nav>

  <!-- Main Content Area -->
  <main [class.reveal]="true">
    <router-outlet></router-outlet>
  </main>

  <app-toast></app-toast>
</div>
